name: Flowzone

on:
  pull_request:
    types: [opened, synchronize, closed]
    branches:
      - balena

jobs:
  flowzone:
    name: Flowzone
    uses: product-os/flowzone/.github/workflows/flowzone.yml@7db3b3261f71eb086ce6ce7cc623d63517926f07 # master
    secrets: inherit
    with:
      # Disable versioning as we don't want to version the firmware or our packaging workflows.
      # We also don't want Flowzone to finalize balena releases unless they are tagged upstream.
      disable_versioning: true
